<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TinyToolbox Corp Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    @keyframes pulse { 50% { opacity: 0.5; } }
    .status-dot { animation: pulse 2s infinite; }
  </style>
</head>
<body class="bg-black text-white min-h-screen font-sans">
  <div class="p-8 text-center">
    <h1 class="text-4xl font-bold mb-4">TinyToolbox Corporation</h1>
    <p class="text-xl text-zinc-400">Full dashboard coming...</p>
    <div class="mt-8 grid grid-cols-4 gap-4">
      <div class="glass rounded-xl p-6">
        <p class="text-3xl font-bold text-cyan-400">431</p>
        <p class="text-zinc-500">Tools</p>
      </div>
      <div class="glass rounded-xl p-6">
        <p class="text-3xl font-bold text-emerald-400">95.6</p>
        <p class="text-zinc-500">Performance</p>
      </div>
      <div class="glass rounded-xl p-6">
        <p class="text-3xl font-bold text-amber-400">32</p>
        <p class="text-zinc-500">Affiliates</p>
      </div>
      <div class="glass rounded-xl p-6">
        <p class="text-3xl font-bold text-rose-400">4</p>
        <p class="text-zinc-500">Issues</p>
      </div>
    </div>
  </div>
</body>
</html>
