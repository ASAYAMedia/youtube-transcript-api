<!DOCTYPE html>
<html lang='en'>
<head>

  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>TinyToolbox Corporation Dashboard</title>
  <script src='https://cdn.tailwindcss.com'></script>

  <div class='p-8'>
    <h1 class='text-4xl font-bold mb-4'>TinyToolbox Corporation</h1>

</html>
